<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish — Retseptlar Dunyosi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2A1810; --cream: #FBF3E7; --paper: #F4E9D8;
    --saffron: #E8A33D; --tomato: #C4432F; --char: #1C120B;
    --font-display: 'Fraunces', serif; --font-body: 'Outfit', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body); background: var(--char);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(circle at 20% 30%, rgba(232,163,61,0.15), transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(196,67,47,0.15), transparent 50%);
    padding: 20px;
  }
  .auth-card {
    background: var(--cream); border-radius: 16px; padding: 48px 40px;
    width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-family: var(--font-display); font-size: 1.8rem; color: var(--ink); }
  .logo h1 span { color: var(--saffron); }
  .logo p { color: rgba(42,24,16,0.6); font-size: 0.88rem; margin-top: 6px; }
  .tabs { display: flex; background: var(--paper); border-radius: 8px; padding: 4px; margin-bottom: 28px; }
  .tab {
    flex: 1; padding: 10px; text-align: center; border-radius: 6px;
    font-weight: 600; font-size: 0.88rem; cursor: pointer; border: none;
    background: none; color: rgba(42,24,16,0.5); font-family: var(--font-body); transition: all 0.2s;
  }
  .tab.active { background: var(--cream); color: var(--ink); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 8px;
    border: 1px solid rgba(42,24,16,0.16); background: var(--paper);
    font-family: var(--font-body); font-size: 0.92rem; color: var(--ink); transition: border 0.2s;
  }
  input:focus { outline: none; border-color: var(--saffron); }
  .btn {
    width: 100%; padding: 14px; background: var(--tomato); color: white;
    border: none; border-radius: 8px; font-family: var(--font-body);
    font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s;
  }
  .btn:hover { background: #9e331f; }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .error {
    background: rgba(196,67,47,0.1); color: var(--tomato); padding: 10px 14px;
    border-radius: 8px; font-size: 0.85rem; margin-top: 14px; display: none;
  }
  .error.show { display: block; }
  .success {
    background: rgba(92,122,79,0.1); color: #3d6b31; padding: 10px 14px;
    border-radius: 8px; font-size: 0.85rem; margin-top: 14px; display: none;
  }
  .success.show { display: block; }
  #registerForm { display: none; }
</style>
</head>
<body>

<a href="index.html" style="position:fixed; top:24px; left:24px; display:flex; align-items:center; gap:8px; color:var(--cream); font-size:0.88rem; font-weight:600; opacity:0.85; z-index:10;">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
  Orqaga
</a>

<div class="auth-card">
  <div class="logo">
    <h1>Retseptlar <span>Dunyosi</span></h1>
    <p>Dunyo oshxonasi bir qadamda</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Kirish</button>
    <button class="tab" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
  </div>

  <form id="loginForm" onsubmit="login(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="loginBtn">Kirish</button>
    <div class="error" id="loginError"></div>
  </form>

  <form id="registerForm" onsubmit="register(event)">
    <div class="form-group">
      <label>Foydalanuvchi nomi</label>
      <input type="text" id="regUsername" placeholder="oshpaz_omon" required>
    </div>
    <div class="form-group">
      <label>To'liq ism</label>
      <input type="text" id="regFullname" placeholder="Omon Karimov" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" id="regPassword" placeholder="Kamida 6 ta belgi" required>
    </div>
    <button type="submit" class="btn" id="registerBtn">Ro'yxatdan o'tish</button>
    <div class="error" id="registerError"></div>
    <div class="success" id="registerSuccess"></div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://djpdfvngatsbfrenfzah.supabase.co";
  const SUPABASE_KEY = "sb_publishable_8fhNqJTTa7mCre0IBCuY8Q_2_K4rCE1";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getUser().then(({ data: { user } }) => {
    if (user) window.location.href = "index.html";
  });

  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");
    document.getElementById("loginForm").style.display = tab === "login" ? "block" : "none";
    document.getElementById("registerForm").style.display = tab === "register" ? "block" : "none";
  }

  async function login(e) {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    const errorEl = document.getElementById("loginError");
    btn.disabled = true;
    btn.textContent = "Kirilmoqda...";
    errorEl.classList.remove("show");

    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById("loginEmail").value,
      password: document.getElementById("loginPassword").value
    });

    if (error) {
      errorEl.textContent = error.message;
      errorEl.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Kirish";
    } else {
      window.location.href = "index.html";
    }
  }

  async function register(e) {
    e.preventDefault();
    const btn = document.getElementById("registerBtn");
    const errorEl = document.getElementById("registerError");
    const successEl = document.getElementById("registerSuccess");
    btn.disabled = true;
    btn.textContent = "Ro'yxatdan o'tilmoqda...";
    errorEl.classList.remove("show");

    const username = document.getElementById("regUsername").value;
    const fullname = document.getElementById("regFullname").value;
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;

    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username, full_name: fullname } }
    });

    if (error) {
      errorEl.textContent = error.message || "Noma'lum xato. Konsolni (F12) tekshiring.";
      errorEl.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Ro'yxatdan o'tish";
    } else if (data?.user && data.user.identities && data.user.identities.length === 0) {
      errorEl.textContent = "Bu email allaqachon ro'yxatdan o'tgan. Kirish bo'limidan foydalaning.";
      errorEl.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Ro'yxatdan o'tish";
    } else {
      successEl.textContent = "Muvaffaqiyatli! Emailingizni tasdiqlang.";
      successEl.classList.add("show");
      btn.textContent = "Yuborildi!";
    }
  }
</script>
</body>
</html>
